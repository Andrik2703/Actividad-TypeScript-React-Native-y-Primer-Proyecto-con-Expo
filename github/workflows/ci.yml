name: CI App Logistica

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validar-codigo:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Verificar tipos TypeScript
        run: npx tsc --noEmit

      - name: Revisar estilo de codigo con ESLint
        run: npm run lint

